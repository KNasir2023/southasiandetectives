    <style>

        #side-panel { transition: transform 0.3s ease-in-out; z-index: 1000; }
        .panel-hidden { transform: translateX(100%); }

        .custom-scroll::-webkit-scrollbar-track { background: #0f172a; }

            <span class="bg-purple-950/60 border border-purple-900/50 text-purple-400 text-[10px] px-2 py-0.5 rounded-md font-mono font-bold">Imran</span>
        </div>

    <!-- Leaflet Structural Anchor -->

            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">

            </svg>

        <!-- Main Content Area (Scrollable) -->
        <div id="panel-content" class="overflow-y-auto flex-1 p-6 pt-16 custom-scroll">
            <!-- Dynamic Data Templates inject here -->

                <li><a href="https://medium.com/@khalednasir" target="_blank" rel="noopener noreferrer" class="hover:underline">Medium</a></li>
                <li><a href="https://www.instagram.com/khalednasir/" target="_blank" rel="noopener noreferrer" class="hover:underline">Instagram</a></li>
            </ul>
        </div>
    </div>

    <script>

                reason: "Infiltrating ultra-secure intelligence cells and counter-tracking international syndicates while maintaining his deceptive eccentric persona.",

                tags: ["Deep Espionage", "X-2 Secret Command"]
            },
            {
                id: "imran-paris",
                series: "Imran Series / Tin Goyenda",
                protagonist: "Ali Imran / Kishore Pasha",
                title: "Paris Joint Transit Threat",
                location: "Paris, France",
                coords: [48.8566, 2.3522],
                colorClass: "text-purple-400 bg-purple-950/50 border-purple-900/50",

                reason: "Tracking missing subcontinental artifact treasures while navigating localized networks hidden in the French capital.",
                metrics: { logic: 96, action: 80, tech: 90, tracking: 94 },
                tags: ["Asset Recovery", "European Operation"]
            }
        ];

        // Init Map
        const map = L.map('map', { zoomControl: false }).setView([25, 20], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors © CARTO'
        }).addTo(map);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // Map Markers
        detectiveDatabase.forEach(book => {
            const marker = L.marker(book.coords).addTo(map);
            marker.on('click', () => {
                map.panTo(book.coords);
                openPanel(book);
            });
        });

        // Open Sidebar Dynamic Content
        function openPanel(book) {
            const panel = document.getElementById('side-panel');
            const content = document.getElementById('panel-content');

            content.innerHTML = `
                <div class="mb-4">
                    <span class="text-[10px] font-mono tracking-widest uppercase border px-2.5 py-1 rounded-md font-bold ${book.colorClass}">
                        ${book.series}
                    </span>
                </div>

                <div class="mb-6">
                    <h2 class="text-2xl font-black text-white tracking-tight leading-tight">${book.title}</h2>
                    <p class="text-slate-400 text-xs font-mono uppercase tracking-wider mt-1.5 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full ${book.badgeColor}"></span>
                        Field Agent: <span class="text-white font-bold font-sans normal-case">${book.protagonist}</span>
                    </p>
                </div>

                <div class="bg-slate-950 p-4 border border-slate-800 rounded-xl space-y-2 mb-6">
                    <div class="flex items-center gap-2 text-xs text-slate-300">
                        <svg class="w-4 h-4 text-slate-500 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        <span class="font-bold text-slate-200">${book.location}</span>
                    </div>
                    <div class="font-mono text-[10px] text-slate-500 pl-6">
                        LAT: ${book.coords[0].toFixed(4)} // LNG: ${book.coords[1].toFixed(4)}
                    </div>
                </div>

                <div class="mb-6">
                    <h4 class="text-[11px] font-bold text-slate-400 uppercase tracking-wider font-mono mb-2">Primary Objective</h4>
                    <p class="text-sm text-slate-300 leading-relaxed bg-slate-950/40 border border-slate-800 p-3 rounded-lg italic">
                        "${book.reason}"
                    </p>
                </div>

                <div class="border-t border-slate-800 pt-5">
                    <h4 class="text-[11px] font-bold text-slate-400 uppercase tracking-wider font-mono mb-4">Operational Performance Vector</h4>
                    ${Object.entries(book.metrics).map(([key, val]) => `
                        <div class="mb-3.5">
                            <div class="flex justify-between text-xs mb-1 font-mono uppercase text-slate-400">
                                <span class="tracking-tighter">${key}</span>
                                <span class="text-slate-200 font-bold">${val}%</span>
                            </div>
                            <div class="w-full bg-slate-950 h-1.5 rounded-full border border-slate-800 overflow-hidden">
                                <div class="${book.badgeColor} h-full rounded-full" style="width: ${val}%"></div>
                            </div>
                        </div>
                    `).join('')}
                </div>

                <div class="mt-6 pt-4 border-t border-slate-800 flex flex-wrap gap-1.5">
                    ${book.tags.map(tag => `
                        <span class="bg-slate-950 border border-slate-800 text-slate-400 font-mono text-[10px] px-2.5 py-1 rounded-md">
                            #${tag}
                        </span>
                    `).join('')}
                </div>
            `;

            panel.classList.remove('panel-hidden');
            panel.classList.add('panel-visible');
        }

        function closePanel() {
            const panel = document.getElementById('side-panel');
            panel.classList.remove('panel-visible');
            panel.classList.add('panel-hidden');
        }
    </script>
</body>
